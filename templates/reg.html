<!DOCTYPE html>
<html>
<head>
  <title>Register</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

    body {
      min-height: 100vh;
      background: #0e1015;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 24px;
    }

    .card {
      width: 100%;
      max-width: 400px;
      background: #181b22;
      border: 1px solid #262a33;
      border-radius: 14px;
      padding: 36px 32px;
    }

    .brand {
      text-align: center;
      margin-bottom: 28px;
    }

    .brand-icon {
      width: 44px;
      height: 44px;
      background: #4f6df5;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      margin: 0 auto 14px auto;
    }

    .brand h2 {
      font-size: 20px;
      font-weight: 700;
      color: #f1f2f4;
      margin-bottom: 4px;
    }

    .brand p {
      font-size: 13px;
      color: #8b919e;
    }

    .form-group { margin-bottom: 14px; }

    label {
      display: block;
      font-size: 12.5px;
      font-weight: 500;
      color: #aab0bd;
      margin-bottom: 6px;
    }

    input {
      width: 100%;
      padding: 10px 14px;
      background: #0e1015;
      border: 1px solid #262a33;
      border-radius: 8px;
      color: #f1f2f4;
      font-size: 13.5px;
      outline: none;
      transition: border-color .15s;
    }

    input:focus { border-color: #4f6df5; }
    input::placeholder { color: #4b5260; }

    .btn-submit {
      width: 100%;
      padding: 11px;
      background: #4f6df5;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 6px;
      transition: opacity .15s;
    }
    .btn-submit:hover { opacity: .9; }

    .spinner {
      display: none;
      text-align: center;
      margin-top: 16px;
      color: #8b919e;
      font-size: 13px;
    }

    .spinner-ring {
      display: inline-block;
      width: 22px;
      height: 22px;
      border: 3px solid #262a33;
      border-top-color: #4f6df5;
      border-radius: 50%;
      animation: spin .7s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .divider {
      text-align: center;
      margin: 20px 0 0 0;
      font-size: 13px;
      color: #8b919e;
    }

    .divider a {
      color: #4f6df5;
      text-decoration: none;
      font-weight: 500;
    }
    .divider a:hover { text-decoration: underline; }
  </style>
</head>

<body>

<div class="card">

  <div class="brand">
    
    <h2>Create Account</h2>
    <p>Fill in the details below to get started</p>
  </div>

  <form method="post" onsubmit="showSpinner()">

    <div class="form-group">
      <label>Username</label>
      <input type="text" name="username" placeholder="Enter your username" required>
    </div>

    <div class="form-group">
      <label>Email</label>
      <input type="email" name="email" placeholder="you@example.com" required>
    </div>

    <div class="form-group">
      <label>Password</label>
      <input type="password" name="password" placeholder="Create a password" required>
    </div>

    <div class="form-group">
      <label>Secret Key</label>
      <input type="text" name="secret_key" placeholder="Enter registration key" required>
    </div>

    <button type="submit" class="btn-submit">Create Account</button>

  </form>

  <div class="spinner" id="spinner">
    <span class="spinner-ring"></span> Creating your account...
  </div>

  <div class="divider">
    Already have an account? <a href="/">Sign in</a>
  </div>

</div>

<script>
  function showSpinner() {
    document.getElementById("spinner").style.display = "block";
  }
</script>

</body>
</html>
