<!DOCTYPE html>
<html>
<head>
<title>Profile</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
:root {
    --bg: #f6f7f9;
    --topbar-bg: #15181f;
    --card-bg: #ffffff;
    --card-border: #e6e8ec;
    --text: #16181d;
    --text-muted: #6b7280;
    --accent: #4f6df5;
    --danger: #e5484d;
}

body.dark {
    --bg: #0e1015;
    --topbar-bg: #0a0c10;
    --card-bg: #181b22;
    --card-border: #262a33;
    --text: #f1f2f4;
    --text-muted: #8b919e;
    --accent: #5c7cfa;
}

* { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

body {
    min-height: 100vh;
    background: var(--bg);
    color: var(--text);
    display: flex;
    flex-direction: column;
}

/* TOPBAR */
.topbar {
    height: 60px;
    background: var(--topbar-bg);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 28px;
}

.topbar .title { font-size: 16px; font-weight: 600; color: #fff; }

.back-btn {
    text-decoration: none;
    background: rgba(255,255,255,0.08);
    color: #fff;
    padding: 8px 16px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 500;
    transition: background .15s;
}
.back-btn:hover { background: rgba(255,255,255,0.16); }

/* CONTENT */
.content {
    flex: 1;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 40px 24px;
}

/* CARD */
.card {
    width: 100%;
    max-width: 420px;
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: 14px;
    overflow: hidden;
}

/* CARD TOP — avatar section */
.card-top {
    padding: 32px 28px 24px 28px;
    display: flex;
    flex-direction: column;
    align-items: center;
    border-bottom: 1px solid var(--card-border);
    gap: 12px;
}

.avatar, .profile-pic {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    border: 3px solid var(--card-border);
}

.profile-pic { object-fit: cover; }

.avatar {
    background: var(--accent);
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 30px;
    font-weight: 700;
}

.user-info { text-align: center; }
.user-info h2 { font-size: 18px; font-weight: 700; margin-bottom: 3px; }
.user-info p  { font-size: 13px; color: var(--text-muted); }

.logout-badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 600;
}
.badge-allowed  { background: #d1fae5; color: #065f46; }
.badge-blocked  { background: #fee2e2; color: #991b1b; }

body.dark .badge-allowed { background: #052e16; color: #6ee7b7; }
body.dark .badge-blocked { background: #3b0a0a; color: #fca5a5; }

/* CARD BODY — action links */
.card-body { padding: 10px 0; }

.action-link {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 24px;
    text-decoration: none;
    color: var(--text);
    font-size: 14px;
    font-weight: 500;
    transition: background .15s;
    border-bottom: 1px solid var(--card-border);
}
.action-link:last-child { border-bottom: none; }
.action-link:hover { background: var(--bg); }

.action-link .icon {
    width: 32px;
    height: 32px;
    border-radius: 8px;
    background: var(--bg);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 15px;
    flex-shrink: 0;
    border: 1px solid var(--card-border);
}

.action-link.danger { color: var(--danger); }
.action-link.danger .icon { background: #fee2e2; border-color: #fecaca; }
body.dark .action-link.danger .icon { background: #3b0a0a; border-color: #7f1d1d; }

.action-link .chevron {
    margin-left: auto;
    color: var(--text-muted);
    font-size: 13px;
}
</style>
</head>

<body class="{{ session.get('theme','dark') }}">

<nav class="topbar">
    <span class="title">Profile</span>
    <a href="{{ url_for('dashboard') }}" class="back-btn">Back to Dashboard</a>
</nav>

<div class="content">
<div class="card">

    <div class="card-top">
        {% if user[2] %}
        <img src="{{ url_for('static', filename='profile_pics/' ~ user[2]) }}" class="profile-pic">
        {% else %}
        <div class="avatar">{{ user[0][0]|upper }}</div>
        {% endif %}

        <div class="user-info">
            <h2>{{ user[0] }}</h2>
            <p>{{ user[1] }}</p>
        </div>

        {% if can_logout == 1 %}
        <span class="logout-badge badge-allowed">✓ Logout allowed</span>
        {% else %}
        <span class="logout-badge badge-blocked"> Logout blocked</span>
        {% endif %}
    </div>

    <div class="card-body">

        <a href="/edit_profile" class="action-link">
            
            Edit Profile
            <span class="chevron">›</span>
        </a>

        <a href="/delete_profile_pic" class="action-link">
            
            Delete Profile Picture
            <span class="chevron">›</span>
        </a>

        <a href="/delete_account" class="action-link danger"
           onclick="return confirm('Are you sure you want to delete your account? This cannot be undone.')">
            
            Delete Account
            <span class="chevron">›</span>
        </a>

    </div>

</div>
</div>

</body>
</html>
