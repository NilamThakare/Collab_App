<!DOCTYPE html>
<html>
<head>
<title>Edit Profile</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
* { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

body {
    min-height: 100vh;
    background: #0e1015;
    color: #f1f2f4;
    display: flex;
    flex-direction: column;
}

.topbar {
    height: 60px;
    background: #0a0c10;
    border-bottom: 1px solid #1e2330;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 28px;
}

.topbar .title { font-size: 16px; font-weight: 600; color: #fff; }

.back-btn {
    text-decoration: none;
    background: rgba(255,255,255,0.08);
    color: #fff;
    padding: 8px 16px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 500;
    transition: background .15s;
}
.back-btn:hover { background: rgba(255,255,255,0.16); }

.content {
    flex: 1;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 40px 24px;
}

.card {
    width: 100%;
    max-width: 440px;
    background: #181b22;
    border: 1px solid #262a33;
    border-radius: 14px;
    overflow: hidden;
}

.card-top {
    padding: 28px 28px 24px 28px;
    display: flex;
    flex-direction: column;
    align-items: center;
    border-bottom: 1px solid #262a33;
    gap: 12px;
}

.avatar, .avatar-preview {
    width: 72px;
    height: 72px;
    border-radius: 50%;
    border: 3px solid #262a33;
}

.avatar-preview { object-fit: cover; }

.avatar {
    background: #4f6df5;
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 26px;
    font-weight: 700;
}

.card-top p { font-size: 13px; color: #8b919e; }

.card-body { padding: 24px 28px 28px 28px; }

.form-group { margin-bottom: 16px; }

label {
    display: block;
    font-size: 12.5px;
    font-weight: 500;
    color: #aab0bd;
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: .05em;
}

input[type="text"],
input[type="email"],
input[type="password"],
input[type="file"] {
    width: 100%;
    padding: 10px 14px;
    background: #0e1015;
    border: 1px solid #262a33;
    border-radius: 8px;
    color: #f1f2f4;
    font-size: 13.5px;
    outline: none;
    transition: border-color .15s;
    font-family: 'Inter', sans-serif;
}
input:focus { border-color: #4f6df5; }
input::placeholder { color: #4b5260; }
input[type="file"] { color: #8b919e; padding: 8px 14px; }

.btn-submit {
    width: 100%;
    padding: 11px;
    background: #4f6df5;
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 6px;
    transition: opacity .15s;
}
.btn-submit:hover { opacity: .9; }
</style>
</head>

<body>

<nav class="topbar">
    <span class="title">Edit Profile</span>
    <a href="/profile" class="back-btn">Back to Profile</a>
</nav>

<div class="content">
<div class="card">

    <div class="card-top">
        {% if user[2] %}
        <img src="{{ url_for('static', filename='profile_pics/' ~ user[2]) }}" class="avatar-preview">
        {% else %}
        <div class="avatar">{{ user[0][0]|upper }}</div>
        {% endif %}
        <p>Update your name, password or profile picture</p>
    </div>

    <div class="card-body">
        <form method="post" enctype="multipart/form-data">

            <div class="form-group">
                <label>Username</label>
                <input type="text" name="username" value="{{ user[0] }}">
            </div>

            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" value="{{ user[1] }}">
            </div>

            <div class="form-group">
                <label>New Password</label>
                <input type="password" name="password" placeholder="Leave blank to keep same password">
            </div>

            <div class="form-group">
                <label>Profile Picture</label>
                <input type="file" name="profile_pic">
            </div>

            <button type="submit" class="btn-submit">Save Changes</button>

        </form>
    </div>

</div>
</div>

</body>
</html>
