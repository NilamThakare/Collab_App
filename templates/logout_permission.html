<!DOCTYPE html>
<html>
<head>
<title>Logout Blocked</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
* { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

body {
    min-height: 100vh;
    background: #0e1015;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 24px;
    color: #f1f2f4;
}

.card {
    width: 100%;
    max-width: 380px;
    background: #181b22;
    border: 1px solid #262a33;
    border-radius: 14px;
    padding: 36px 32px;
    text-align: center;
}

.icon {
    width: 56px;
    height: 56px;
    background: #3b0a0a;
    border: 1px solid #7f1d1d;
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
    margin: 0 auto 20px auto;
}

h2 {
    font-size: 20px;
    font-weight: 700;
    margin-bottom: 10px;
    color: #f1f2f4;
}

.subtitle {
    font-size: 13.5px;
    color: #8b919e;
    line-height: 1.6;
    margin-bottom: 28px;
}

.info-box {
    background: #1c2236;
    border: 1px solid #2e3a55;
    border-radius: 10px;
    padding: 14px 16px;
    font-size: 13px;
    color: #93c5fd;
    margin-bottom: 24px;
    line-height: 1.5;
}

.btn {
    display: block;
    width: 100%;
    padding: 11px;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    text-decoration: none;
    text-align: center;
    transition: opacity .15s;
    margin-bottom: 10px;
}

.btn-primary { background: #4f6df5; color: #fff; }
.btn-primary:hover { opacity: .9; }

.btn-ghost {
    background: transparent;
    border: 1px solid #262a33;
    color: #8b919e;
}
.btn-ghost:hover { background: #262a33; color: #f1f2f4; }
</style>
</head>

<body>

<div class="card">

    <div class="icon">⛔</div>

    <h2>Logout blocked</h2>

    <p class="subtitle">
        You cannot log out before completing your 2-hour session.
        You need admin permission to leave early.
    </p>

    <div class="info-box">
         Ask your admin to grant early logout permission from the admin dashboard.
    </div>

    <form method="post" action="/send_logout_request">
        <button type="submit" class="btn btn-primary">Request Permission</button>
    </form>

    <a href="/dashboard" class="btn btn-ghost">Back to Dashboard</a>

</div>

</body>
</html>
