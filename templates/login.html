<!DOCTYPE html>
<html>
<head>
  <title>Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

    body {
      min-height: 100vh;
      background: #0e1015;
      display: flex;
      flex-direction: column;
    }

    /* TOPNAV */
    .top-nav {
      height: 56px;
      background: #0a0c10;
      border-bottom: 1px solid #1e2330;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 32px;
      flex-shrink: 0;
    }

    .nav-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .nav-logo { width: 28px; }

    .brand-name {
      font-size: 15px;
      font-weight: 700;
      color: #fff;
    }

    .nav-right { display: flex; gap: 6px; }

    .nav-right a {
      color: #8b919e;
      text-decoration: none;
      font-size: 13px;
      font-weight: 500;
      padding: 6px 12px;
      border-radius: 7px;
      transition: background .15s, color .15s;
    }
    .nav-right a:hover { background: rgba(255,255,255,0.07); color: #fff; }

    /* CONTENT */
    .content {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 40px 24px;
    }

    /* CARD */
    .card {
      width: 100%;
      max-width: 380px;
      background: #181b22;
      border: 1px solid #262a33;
      border-radius: 14px;
      padding: 36px 32px;
    }

    .brand {
      text-align: center;
      margin-bottom: 28px;
    }

    .brand-icon {
      width: 44px;
      height: 44px;
      margin: 0 auto 14px auto;
    }

    .brand h2 {
      font-size: 20px;
      font-weight: 700;
      color: #f1f2f4;
      margin-bottom: 4px;
    }

    .brand p { font-size: 13px; color: #8b919e; }

    /* ERROR */
    .error-msg {
      background: #3b0a0a;
      border: 1px solid #7f1d1d;
      color: #fca5a5;
      font-size: 13px;
      padding: 10px 14px;
      border-radius: 8px;
      margin-bottom: 16px;
      text-align: center;
    }

    /* FORM */
    .form-group { margin-bottom: 14px; }

    label {
      display: block;
      font-size: 12.5px;
      font-weight: 500;
      color: #aab0bd;
      margin-bottom: 6px;
    }

    input, select {
      width: 100%;
      padding: 10px 14px;
      background: #0e1015;
      border: 1px solid #262a33;
      border-radius: 8px;
      color: #f1f2f4;
      font-size: 13.5px;
      outline: none;
      transition: border-color .15s;
    }
    input:focus, select:focus { border-color: #4f6df5; }
    input::placeholder { color: #4b5260; }
    select option { background: #181b22; }

    .password-wrapper { position: relative; }

    .password-wrapper input { padding-right: 42px; }

    .show-btn {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      cursor: pointer;
      font-size: 15px;
      color: #8b919e;
      background: none;
      border: none;
      padding: 0;
      line-height: 1;
    }

    .btn-submit {
      width: 100%;
      padding: 11px;
      background: #4f6df5;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 6px;
      transition: opacity .15s;
    }
    .btn-submit:hover { opacity: .9; }

    .spinner {
      display: none;
      text-align: center;
      margin-top: 16px;
      color: #8b919e;
      font-size: 13px;
    }

    .spinner-ring {
      display: inline-block;
      width: 22px;
      height: 22px;
      border: 3px solid #262a33;
      border-top-color: #4f6df5;
      border-radius: 50%;
      animation: spin .7s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .divider {
      text-align: center;
      margin-top: 20px;
      font-size: 13px;
      color: #8b919e;
    }

    .divider a {
      color: #4f6df5;
      text-decoration: none;
      font-weight: 500;
    }
    .divider a:hover { text-decoration: underline; }
  </style>
</head>

<body>

<nav class="top-nav">
  <div class="nav-left">
    
    <span class="brand-name">Collab App</span>
  </div>
  <div class="nav-right">
    <a href="/about">About</a>
    <a href="/contact">Contact</a>
  </div>
</nav>

<div class="content">
<div class="card">

  <div class="brand">
    
    <h2>Welcome back</h2>
    <p>Sign in to your account</p>
  </div>

  {% if error %}
  <div class="error-msg">{{ error }}</div>
  {% endif %}

  <form method="POST" action="/login" onsubmit="showSpinner()">

    <div class="form-group">
      <label>Email</label>
      <input type="email" name="email" placeholder="you@example.com" required>
    </div>

    <div class="form-group">
      <label>Password</label>
      <div class="password-wrapper">
        <input type="password" id="password" name="password" placeholder="Enter your password" required>
        <button type="button" class="show-btn" onclick="togglePassword()" id="toggleIcon">👁️</button>
      </div>
    </div>

    <div class="form-group">
      <label>Login as</label>
      <select name="login_type">
        <option value="user">User</option>
        <option value="admin">Admin</option>
      </select>
    </div>

    <button type="submit" class="btn-submit">Sign in</button>

  </form>

  <div class="spinner" id="spinner">
    <span class="spinner-ring"></span> Signing in...
  </div>

  <div class="divider">
    No account? <a href="/register">Create one</a>
  </div>

</div>
</div>

<script>
  function togglePassword() {
    const pass = document.getElementById("password");
    const icon = document.getElementById("toggleIcon");
    if (pass.type === "password") {
      pass.type = "text";
      icon.innerText = "Hide";
    } else {
      pass.type = "password";
      icon.innerText = "Show";
    }
  }

  function showSpinner() {
    document.getElementById("spinner").style.display = "block";
  }
</script>

</body>
</html>
